<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact HATKRS | Inquiry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <!-- Navbar (Same as index.html) -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="index.html">HATKRS</a>
            <ul class="navbar-nav ms-auto fw-bold">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-5">
            <!-- Contact Form -->
            <div class="col-md-7">
                <div class="card p-4 shadow-sm border-0">
                    <h3 class="fw-bold mb-4">Request a Demo Batch</h3>
                    <form>
                        <div class="mb-3"><input type="text" class="form-control" placeholder="Your Name"></div>
                        <div class="mb-3"><input type="email" class="form-control" placeholder="Email ID"></div>
                        <div class="mb-3"><input type="text" class="form-control" placeholder="Mobile Number"></div>
                        <div class="mb-3">
                            <select class="form-select">
                                <option selected>Select Course</option>
                                <option>Cybersecurity / SOC</option>
                                <option>Full Stack Java</option>
                                <option>Networking</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Submit Inquiry</button>
                    </form>
                </div>
            </div>
            <!-- Social Buttons -->
            <div class="col-md-5">
                <h3 class="fw-bold mb-4">Follow Us</h3>
                <div class="d-grid gap-3">
                    <a href="https://youtube.com/@hatkrs" class="btn btn-outline-danger py-3 fw-bold"><i class="bi bi-youtube me-2"></i> YouTube Channel</a>
                    <a href="https://facebook.com/hatkrs" class="btn btn-outline-primary py-3 fw-bold"><i class="bi bi-facebook me-2"></i> Facebook Page</a>
                    <a href="https://twitter.com/hatkrs" class="btn btn-outline-info py-3 fw-bold text-dark"><i class="bi bi-twitter-x me-2"></i> Twitter Feed</a>
                    <a href="https://instagram.com/hatkrsofficial" class="btn btn-outline-warning py-3 fw-bold text-dark"><i class="bi bi-instagram me-2"></i> Instagram Profile</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
